<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h1>Gestión de Incidencias</h1>

  <form id="loginForm">
    <input
      type="email"
      id="email"
      placeholder="Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Contraseña"
      required
    >

    <button type="submit">Entrar</button>
  </form>

  <script src="js/data.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
